# Release workflow — build cross-platform binaries and upload to GitHub Release
# Triggered by:
#   1. Tag push matching v*
#   2. Workflow dispatch from release-please.yml after creating a GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: clawup

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            use-cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation targets)
        if: matrix.use-cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl-tools (for native musl builds)
        if: contains(matrix.target, 'musl') && matrix.use-cross != true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p clawup
          else
            cargo build --release --target ${{ matrix.target }} -p clawup
          fi

      - name: Prepare archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${BINARY_NAME}"
          ARCHIVE="${BINARY_NAME}-${{ matrix.target }}.tar.gz"
          chmod +x "$BINARY"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${BINARY_NAME}"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Prepare archive (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${BINARY_NAME}.exe"
          ARCHIVE="${BINARY_NAME}-${{ matrix.target }}.zip"
          7z a "$ARCHIVE" "$BINARY"
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 1

  upload:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
