# Release workflow using rust-actions-toolkit v4 reusable workflow
# Triggered by:
#   1. Tag push matching v* (manual tag push or PAT-based release-please)
#   2. Workflow dispatch from release-please.yml after creating a GitHub Release
# See: https://github.com/loonghao/rust-actions-toolkit
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: loonghao/rust-actions-toolkit/.github/workflows/reusable-release.yml@v4
    with:
      rust-toolchain: stable
      binary-name: "clawup"
      enable-python-wheels: false
      # Override default target-platforms to use macos-14 (macos-13 is deprecated)
      target-platforms: >-
        [
          {"target": "x86_64-unknown-linux-gnu", "os": "ubuntu-22.04"},
          {"target": "x86_64-unknown-linux-musl", "os": "ubuntu-22.04"},
          {"target": "aarch64-unknown-linux-gnu", "os": "ubuntu-22.04"},
          {"target": "aarch64-unknown-linux-musl", "os": "ubuntu-22.04"},
          {"target": "x86_64-apple-darwin", "os": "macos-14"},
          {"target": "aarch64-apple-darwin", "os": "macos-14"},
          {"target": "x86_64-pc-windows-msvc", "os": "windows-2022"},
          {"target": "aarch64-pc-windows-msvc", "os": "windows-2022"}
        ]
